name: Deploy to GitHub Pages

# Builds the production bundle and publishes it to GitHub Pages on every push to
# main. dist/ is never committed — it is produced fresh and handed straight to
# Pages as an artifact. The app uses relative asset paths (vite base: "./") and
# hash-based navigation, so it works at the project-site subpath
# (https://<user>.github.io/<repo>/) with no base or 404-fallback configuration.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual redeploys from the Actions tab

# Pages needs these permissions; they do not widen anything else.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (runs token generation, then vite build)
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
